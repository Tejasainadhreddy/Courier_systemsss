{% extends "layout.html" %}
{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg p-5 rounded-5 bg-white">
                <h3 class="fw-bold text-center text-dark mb-4">Change Password</h3>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="small fw-bold">Current Password</label>
                        <input type="password" name="old_password" class="form-control bg-light border-0 py-3" required>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">New Password</label>
                        <input type="password" name="new_password" class="form-control bg-light border-0 py-3" required>
                    </div>
                    <div class="mb-4">
                        <label class="small fw-bold">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control bg-light border-0 py-3" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 fw-bold py-3 rounded-pill">Change Password</button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="/user_dashboard" class="text-muted small">← Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

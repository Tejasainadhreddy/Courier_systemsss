{% extends "layout.html" %}
{% block content %}
<div class="container py-5">
    <div class="card shadow-sm p-5 mx-auto" style="max-width: 600px;">
        <h3 class="fw-bold text-center mb-4">Assign Branch / Hub</h3>
        <p class="text-center text-muted">Tracking ID: <strong class="text-danger">{{ courier.cons_no }}</strong></p>
        
        <form method="POST">
            <div class="mb-4">
                <label class="small fw-bold">Select Branch</label>
                <select name="branch_id" class="form-select py-3">
                    <option value="">-- No Branch --</option>
                    {% for b in branches %}
                    <option value="{{ b.id }}">{{ b.name }} ({{ b.location }})</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-dark w-100 py-3 fw-bold">ASSIGN BRANCH</button>
        </form>
        <a href="/admin_dashboard" class="btn btn-link text-muted w-100 mt-3">← Back to Master Ledger</a>
    </div>
</div>
{% endblock %}

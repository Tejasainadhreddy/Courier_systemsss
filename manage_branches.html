{% extends "layout.html" %}
{% block content %}
<div class="container py-5">
    <h2 class="fw-bold mb-4">🌍 Branch / Hub Management</h2>

    <form method="POST" class="card shadow-sm p-4 mb-5">
        <div class="row g-3">
            <div class="col-md-5">
                <label class="small fw-bold">Branch Name</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Hayward Hub" required>
            </div>
            <div class="col-md-5">
                <label class="small fw-bold">Location</label>
                <input type="text" name="location" class="form-control" placeholder="e.g. 25800 Carlos Bee Blvd" required>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-dark w-100">Add Branch</button>
            </div>
        </div>
    </form>

    <h5 class="mb-3">Existing Branches</h5>
    <table class="table table-hover">
        <thead class="table-light">
            <tr><th>Branch Name</th><th>Location</th></tr>
        </thead>
        <tbody>
            {% for b in branches %}
            <tr>
                <td><strong>{{ b.name }}</strong></td>
                <td>{{ b.location }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

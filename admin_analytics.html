{% extends "layout.html" %}
{% block content %}
<div class="container py-5 mt-5">
    <h2 class="fw-bold mb-4">📊 Admin Analytics Dashboard</h2>
    
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-center p-4">
                <h5 class="text-muted">Total Revenue</h5>
                <h2 class="fw-bold text-success">${{ "%.2f"|format(total_revenue) }}</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-center p-4">
                <h5 class="text-muted">Total Shipments</h5>
                <h2 class="fw-bold">{{ total_shipments }}</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-center p-4">
                <h5 class="text-muted">Pending / In Transit</h5>
                <h2 class="fw-bold text-warning">{{ pending }}</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm text-center p-4">
                <h5 class="text-muted">Successfully Delivered</h5>
                <h2 class="fw-bold text-success">{{ delivered }}</h2>
            </div>
        </div>
    </div>

    <div class="mt-5">
        <a href="/admin_dashboard" class="btn btn-dark fw-bold">← Back to Master Ledger</a>
    </div>
</div>
{% endblock %}

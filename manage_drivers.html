{% extends "layout.html" %}
{% block content %}
<div class="container py-5">
    <h2 class="fw-bold mb-4">👷 Driver / Agent Management</h2>

    <form method="POST" class="card shadow-sm p-4 mb-5">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="small fw-bold">Driver Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="col-md-4">
                <label class="small fw-bold">Phone Number</label>
                <input type="tel" name="phone" class="form-control" required>
            </div>
            <div class="col-md-4">
                <label class="small fw-bold">Assign to Branch</label>
                <select name="branch_id" class="form-select" required>
                    {% for b in branches %}
                    <option value="{{ b.id }}">{{ b.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-dark w-100">Add Driver</button>
            </div>
        </div>
    </form>

    <h5 class="mb-3">All Drivers</h5>
    <table class="table table-hover">
        <thead class="table-light">
            <tr><th>Name</th><th>Phone</th><th>Branch</th><th>Status</th></tr>
        </thead>
        <tbody>
            {% for d in drivers %}
            <tr>
                <td>{{ d.name }}</td>
                <td>{{ d.phone }}</td>
                <td>{{ d.branch.name if d.branch else 'Unassigned' }}</td>
                <td>
                    {% if d.is_active %}
                    <span class="badge bg-success">Active</span>
                    {% else %}
                    <span class="badge bg-secondary">Inactive</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
